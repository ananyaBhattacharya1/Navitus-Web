<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career — Navitus</title>
    <link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/font-awesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/vendor/font-awesome/css/font-awesome.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,300i,400,400i,500,700,900%7cSource+Sans+Pro:200,300,300i,400,400i,600,700,900" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme-navitus.css" />
    <link rel="stylesheet" href="css/overrides.css" />
  </head>
  <body class="site" data-page="career">
    <div id="site-header"></div>

    <section class="inner_banner">
      <figure><img src="assets/wp-content/uploads/2019/06/banner002-1.jpg" alt="" /></figure>
      <div class="banner_text"><h1>Career</h1></div>
    </section>

    <section class="blog_page_wrapper">
      <div class="container">
        <div class="row">
          <div class="col-lg-9 col-md-9 col-sm-8 col-xs-12">
            <div class="blog_content">
              <section class="no-results not-found">
                <header class="page-header">
                  <h1 class="page-title">Nothing Found</h1>
                </header>
                <div class="page-content">
                  <p>It seems we can&rsquo;t find what you&rsquo;re looking for. Perhaps searching can help.</p>
                  <form role="search" method="get" class="search-form" action="#">
                    <label for="career-search">
                      <span class="screen-reader-text">Search for:</span>
                    </label>
                    <input type="search" id="career-search" class="search-field" placeholder="Search …" value="" name="s" />
                    <button type="submit" class="search-submit"><i class="fas fa-search" aria-hidden="true"></i><span class="screen-reader-text">Search</span></button>
                  </form>
                </div>
              </section>
            </div>
          </div>
          <div class="col-lg-3 col-md-3 col-sm-4 col-xs-12">
            <div class="inner_blog_form">
              <section class="widget widget_search">
                <form role="search" method="get" class="search-form" action="#">
                  <label for="career-search-2">
                    <span class="screen-reader-text">Search for:</span>
                  </label>
                  <input type="search" id="career-search-2" class="search-field" placeholder="Search …" value="" name="s" />
                  <button type="submit" class="search-submit"><i class="fas fa-search" aria-hidden="true"></i><span class="screen-reader-text">Search</span></button>
                </form>
              </section>
              <section class="widget widget_recent_comments">
                <h2 class="widget-title">Recent Comments</h2>
                <ul id="recentcomments"></ul>
              </section>
              <section class="widget widget_archive">
                <h2 class="widget-title">Archives</h2>
                <ul></ul>
              </section>
              <section class="widget widget_categories">
                <h2 class="widget-title">Categories</h2>
                <ul>
                  <li class="cat-item-none">No categories</li>
                </ul>
              </section>
              <section class="widget widget_meta">
                <h2 class="widget-title">Meta</h2>
                <ul>
                  <li><a href="#">Log in</a></li>
                  <li><a href="#">Entries RSS</a></li>
                  <li><a href="#">Comments RSS</a></li>
                  <li><a href="https://wordpress.org/">WordPress.org</a></li>
                </ul>
              </section>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="site-footer"></div>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
  </body>
</html>
