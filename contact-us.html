<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Us — Navitus</title>
    <link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/font-awesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/vendor/font-awesome/css/font-awesome.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,300i,400,400i,500,700,900%7cSource+Sans+Pro:200,300,300i,400,400i,600,700,900" rel="stylesheet" />
    <link rel="stylesheet" href="css/theme-navitus.css" />
    <link rel="stylesheet" href="css/overrides.css" />
  </head>
  <body class="site" data-page="contact">
    <div id="site-header"></div>

    <section class="inner_banner">
      <figure><img src="assets/wp-content/uploads/2019/06/banner002-1.jpg" alt="" /></figure>
      <div class="banner_text"><h1>Contact Us</h1></div>
    </section>
    <section class="inner_sec">
      <div class="container">
        <div class="row">
          <div class="col-md-6 col-lg-6 col-sm-6 contact_text">
            <ul>
              <li>
                <i class="fas fa-map-marker-alt"></i> <a href="https://www.google.com/maps/search/?api=1&amp;query=G882%2B3V2%2C+Taratala%2C+Kolkata%2C+West+Bengal+700088" target="_blank" rel="noopener noreferrer">G882+3V2, Taratala, Kolkata, West Bengal 700088</a>
              </li>
              <li><i class="fas fa-phone-volume"></i><a href="tel:+919831478930">HR's number: +919831478930</a></li>
              <li>
                <i class="fas fa-envelope"></i> <a href="mailto:navitus@navituscontrols.com">navitus@navituscontrols.com</a>
              </li>
              <li><i class="fas fa-globe"></i> <a href="https://navituscontrols.com/">navituscontrols.com</a></li>
            </ul>
          </div>
          <div class="col-md-6 col-lg-6 col-sm-6 contact_form">
            <div role="form" class="wpcf7">
              <form action="#" method="post" class="wpcf7-form" id="contact-form-static" novalidate="novalidate">
                <div class="contact-field">
                  <div class="row">
                    <div class="col-md-6">
                      <label>
                        Your Name (required)<br />
                        <span class="wpcf7-form-control-wrap your-name"><input type="text" name="your-name" value="" size="40" class="wpcf7-form-control wpcf7-text form-control" required aria-required="true" /></span>
                      </label>
                    </div>
                    <div class="col-md-6">
                      <label>
                        Your Email (required)<br />
                        <span class="wpcf7-form-control-wrap your-email"><input type="email" name="your-email" value="" size="40" class="wpcf7-form-control wpcf7-text form-control" required aria-required="true" /></span>
                      </label>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-md-6">
                      <label>
                        Your Subject (required)<br />
                        <span class="wpcf7-form-control-wrap your-subject"><input type="text" name="your-subject" value="" size="40" class="wpcf7-form-control wpcf7-text form-control" /></span>
                      </label>
                    </div>
                    <div class="col-md-6">
                      <label>
                        Your Phone No. (required)<br />
                        <span class="wpcf7-form-control-wrap phone-no"><input type="tel" name="phone-no" value="" size="40" class="wpcf7-form-control wpcf7-text form-control" /></span>
                      </label>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-md-12">
                      <label>
                        Your Message (required)<br />
                        <span class="wpcf7-form-control-wrap your-message"><textarea name="your-message" cols="40" rows="10" class="wpcf7-form-control wpcf7-textarea form-control"></textarea></span>
                      </label>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-md-12">
                      <input type="submit" value="Send" class="wpcf7-form-control wpcf7-submit" />
                    </div>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="site-footer"></div>
    <script src="js/main.js"></script>
    <script src="js/includes.js"></script>
  </body>
</html>
